<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorvas Distribuidora – Catálogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1e1e1e;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text: #f0ece4;
      --muted: #888;
      --border: #2a2a2a;
      --radius: 12px;
      --green: #25d366;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }

    /* HERO */
    header {
      position: relative; padding: 80px 40px 60px; text-align: center;
      overflow: hidden; border-bottom: 1px solid var(--border);
    }
    header::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 0%, rgba(201,168,76,0.18) 0%, transparent 70%),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(201,168,76,0.04) 39px, rgba(201,168,76,0.04) 40px);
      pointer-events: none;
    }
    .logo-badge {
      display: inline-flex; align-items: center; gap: 10px;
      background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.3);
      padding: 6px 18px 6px 10px; border-radius: 999px;
      font-size: .78rem; font-weight: 500; letter-spacing: .12em;
      text-transform: uppercase; color: var(--gold-light); margin-bottom: 28px;
    }
    .logo-badge .dot { width:8px;height:8px;border-radius:50%;background:var(--gold);animation:pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem,6vw,5rem); font-weight: 900; line-height: 1.05;
      background: linear-gradient(135deg,#e8c97a 0%,#c9a84c 50%,#a07830 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; margin-bottom: 16px;
    }
    .tagline { color:var(--muted); font-size:1.05rem; font-weight:300; max-width:500px; margin:0 auto 36px; }

    /* TOOLBAR */
    .toolbar { display:flex; flex-wrap:wrap; gap:12px; justify-content:center; max-width:800px; margin:0 auto; position:relative; z-index:1; }
    .search-wrap { position:relative; flex:1; min-width:240px; }
    .search-wrap svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none; }
    input[type="text"] {
      width:100%; padding:12px 16px 12px 42px; background:var(--card); border:1px solid var(--border);
      border-radius:var(--radius); color:var(--text); font-family:'DM Sans',sans-serif; font-size:.95rem; outline:none; transition:border-color .2s;
    }
    input[type="text"]:focus { border-color:var(--gold); }
    .filters { display:flex; gap:8px; flex-wrap:wrap; }
    .filter-btn {
      padding:10px 18px; border-radius:999px; border:1px solid var(--border);
      background:var(--card); color:var(--muted); font-family:'DM Sans',sans-serif; font-size:.85rem; cursor:pointer; transition:all .2s;
    }
    .filter-btn:hover,.filter-btn.active { border-color:var(--gold); color:var(--gold-light); background:rgba(201,168,76,.08); }

    /* LAYOUT */
    .page-body { display:flex; gap:0; max-width:1300px; margin:0 auto; padding:48px 24px 80px; align-items:flex-start; }
    .catalog-col { flex:1; min-width:0; }
    .section-label {
      font-size:.75rem; letter-spacing:.18em; text-transform:uppercase; color:var(--gold);
      margin-bottom:28px; display:flex; align-items:center; gap:12px;
    }
    .section-label::after { content:''; flex:1; height:1px; background:var(--border); }

    /* GRID */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:18px; }
    .card {
      background:var(--card); border:1px solid var(--border); border-radius:var(--radius);
      overflow:hidden; transition:transform .22s,border-color .22s,box-shadow .22s;
      display:flex; flex-direction:column; animation:fadeUp .5s ease both;
    }
    .card:hover { transform:translateY(-4px); border-color:rgba(201,168,76,.4); box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px rgba(201,168,76,.15); }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
    .card-img-placeholder { width:100%; aspect-ratio:4/3; background:var(--surface); display:flex; align-items:center; justify-content:center; font-size:3rem; }
    .card-body { padding:16px; display:flex; flex-direction:column; flex:1; }
    .card-category { font-size:.7rem; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); margin-bottom:6px; }
    .card-name { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:700; color:var(--text); margin-bottom:6px; line-height:1.3; }
    .card-desc { font-size:.82rem; color:var(--muted); line-height:1.55; margin-bottom:14px; flex:1; }
    .card-footer-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .price { font-size:1.25rem; font-weight:500; color:var(--gold-light); }
    .price sup { font-size:.7rem; vertical-align:super; font-weight:300; }
    .badge { font-size:.7rem; padding:3px 9px; border-radius:999px; background:rgba(201,168,76,.12); color:var(--gold); border:1px solid rgba(201,168,76,.25); }
    .badge.agotado { background:rgba(255,80,80,.1); color:#ff6060; border-color:rgba(255,80,80,.25); }
    .card-actions { display:flex; flex-direction:column; gap:8px; }
    .btn {
      width:100%; padding:9px 14px; border-radius:8px; border:none;
      font-family:'DM Sans',sans-serif; font-size:.82rem; font-weight:500; cursor:pointer;
      display:flex; align-items:center; justify-content:center; gap:7px; transition:all .2s; text-decoration:none;
    }
    .btn-wa { background:#1aad50; color:#fff; }
    .btn-wa:hover { background:#128a3e; }
    .btn-cart { background:rgba(201,168,76,.12); color:var(--gold-light); border:1px solid rgba(201,168,76,.3); }
    .btn-cart:hover { background:rgba(201,168,76,.22); }
    .btn-cart.added { background:rgba(201,168,76,.25); }
    .btn:disabled { opacity:.4; cursor:not-allowed; }

    /* CARRITO SIDEBAR */
    .cart-col { width:320px; flex-shrink:0; margin-left:28px; position:sticky; top:24px; }
    .cart-box { background:var(--card); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
    .cart-header { padding:18px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
    .cart-title { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--text); display:flex; align-items:center; gap:10px; }
    .cart-count { background:var(--gold); color:#000; font-size:.72rem; font-weight:700; font-family:'DM Sans',sans-serif; width:20px; height:20px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; }
    .cart-clear { font-size:.75rem; color:var(--muted); cursor:pointer; background:none; border:none; font-family:'DM Sans',sans-serif; transition:color .2s; }
    .cart-clear:hover { color:#ff6060; }
    .cart-empty { padding:40px 20px; text-align:center; color:var(--muted); font-size:.88rem; }
    .cart-empty svg { margin-bottom:12px; opacity:.35; }
    .cart-items { padding:12px; display:flex; flex-direction:column; gap:10px; max-height:380px; overflow-y:auto; }
    .cart-items::-webkit-scrollbar { width:4px; }
    .cart-items::-webkit-scrollbar-thumb { background:var(--border); border-radius:4px; }
    .cart-item { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px; display:flex; gap:10px; align-items:center; animation:fadeUp .25s ease both; }
    .cart-item-emoji { font-size:1.6rem; width:38px; text-align:center; flex-shrink:0; }
    .cart-item-info { flex:1; min-width:0; }
    .cart-item-name { font-size:.85rem; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .cart-item-price { font-size:.78rem; color:var(--gold); margin-top:2px; }
    .qty-ctrl { display:flex; align-items:center; gap:6px; margin-top:6px; }
    .qty-btn { width:22px; height:22px; border-radius:6px; border:1px solid var(--border); background:var(--card); color:var(--text); font-size:.9rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:border-color .15s; }
    .qty-btn:hover { border-color:var(--gold); color:var(--gold); }
    .qty-num { font-size:.85rem; font-weight:500; min-width:18px; text-align:center; }
    .cart-item-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:1rem; padding:4px; border-radius:6px; transition:color .15s; }
    .cart-item-remove:hover { color:#ff6060; }
    .cart-footer { border-top:1px solid var(--border); padding:16px; }
    .cart-total { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
    .cart-total span:first-child { font-size:.85rem; color:var(--muted); }
    .cart-total-amount { font-size:1.2rem; font-weight:600; color:var(--gold-light); }
    .btn-wa-cart {
      width:100%; padding:13px 16px; border-radius:10px; border:none;
      background:var(--green); color:#fff; font-family:'DM Sans',sans-serif; font-size:.9rem; font-weight:600;
      cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:background .2s,transform .15s;
    }
    .btn-wa-cart:hover { background:#1aad50; transform:scale(1.01); }

    /* EMPTY */
    .empty { text-align:center; padding:80px 20px; color:var(--muted); display:none; }

    /* FAB MOBILE */
    .cart-fab {
      display:none; position:fixed; bottom:28px; right:28px;
      background:var(--gold); color:#000; border:none; border-radius:999px;
      padding:14px 20px; font-family:'DM Sans',sans-serif; font-size:.9rem; font-weight:700;
      cursor:pointer; align-items:center; gap:8px;
      box-shadow:0 6px 24px rgba(201,168,76,.4); z-index:200; transition:transform .2s;
    }
    .cart-fab:hover { transform:scale(1.04); }
    .cart-fab-badge { background:#000; color:var(--gold); border-radius:999px; font-size:.72rem; padding:2px 7px; }

    /* DRAWER */
    .drawer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:300; backdrop-filter:blur(2px); }
    .drawer {
      position:fixed; right:0; top:0; bottom:0; width:min(360px,100vw);
      background:var(--card); z-index:301; transform:translateX(100%); transition:transform .3s ease;
      display:flex; flex-direction:column;
    }
    .drawer.open { transform:translateX(0); }
    .drawer-close {
      position:absolute; top:14px; right:14px; background:var(--surface);
      border:1px solid var(--border); border-radius:8px; color:var(--text);
      width:32px; height:32px; cursor:pointer; font-size:1.1rem; display:flex; align-items:center; justify-content:center;
    }
    .drawer-inner { flex:1; overflow-y:auto; padding:20px 16px 0; }
    .drawer-footer { padding:16px; border-top:1px solid var(--border); }

    /* TOAST */
    .toast {
      position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(20px);
      background:var(--card); border:1px solid var(--gold); color:var(--gold-light);
      padding:10px 20px; border-radius:999px; font-size:.85rem; font-weight:500;
      opacity:0; pointer-events:none; transition:all .3s; z-index:400; white-space:nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    footer { border-top:1px solid var(--border); padding:32px 24px; text-align:center; color:var(--muted); font-size:.85rem; }
    footer strong { color:var(--gold); }

    @media(max-width:900px) { .cart-col{display:none} .cart-fab{display:flex} .drawer-overlay{display:block} }
    @media(max-width:600px) { header{padding:60px 20px 48px} .page-body{padding:32px 16px 100px} }
  </style>
</head>
<body>

<header>
  <div class="logo-badge"><span class="dot"></span>Catálogo en línea</div>
  <h1>Lorvas Distribuidora</h1>
  <p class="tagline">Calidad y variedad en cada producto. Encuentra lo que necesitas.</p>
  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar producto…" oninput="filterProducts()" />
    </div>
    <div class="filters" id="filterBtns"></div>
  </div>
</header>

<div class="page-body">
  <div class="catalog-col">
    <div class="section-label" id="sectionLabel">Todos los productos</div>
    <div class="grid" id="productGrid"></div>
    <div class="empty" id="emptyState">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <p>No se encontraron productos.</p>
    </div>
  </div>
  <aside class="cart-col">
    <div class="cart-box" id="cartBox"></div>
  </aside>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="cartDrawer">
  <button class="drawer-close" onclick="closeDrawer()">✕</button>
  <div class="drawer-inner" id="drawerInner"></div>
  <div class="drawer-footer" id="drawerFooter"></div>
</div>

<button class="cart-fab" id="cartFab" onclick="openDrawer()">
  🛒 Mi carrito <span class="cart-fab-badge" id="fabBadge">0</span>
</button>

<div class="toast" id="toast"></div>

<footer>
  <strong>Lorvas Distribuidora</strong> · Todos los precios en USD · Sujeto a disponibilidad
</footer>

<script>
  const WA_NUMBER = '50372194538';

  // ══════════════════════════════════════════════════
  //  ✏️  EDITA AQUÍ TUS PRODUCTOS
  //  stock: 'disponible' | 'agotado' | 'oferta'
  // ══════════════════════════════════════════════════
  const products = [
    { name:"Producto Ejemplo 1", category:"Categoría A", desc:"Descripción breve del producto. Cambia esto por los detalles reales.", price:9.99, emoji:"📦", stock:"disponible" },
    { name:"Producto Ejemplo 2", category:"Categoría A", desc:"Otro producto. Agrega marca, medida, cantidad, etc.", price:14.50, emoji:"🛍️", stock:"oferta" },
    { name:"Producto Ejemplo 3", category:"Categoría B", desc:"Puedes duplicar estos bloques para agregar más productos.", price:5.25, emoji:"✨", stock:"disponible" },
    { name:"Producto Ejemplo 4", category:"Categoría B", desc:"Si no tienes existencia, cambia stock a 'agotado'.", price:22.00, emoji:"🔒", stock:"agotado" },
    { name:"Producto Ejemplo 5", category:"Categoría C", desc:"Agrega el emoji que mejor represente tu producto.", price:3.75, emoji:"⚡", stock:"disponible" },
    { name:"Producto Ejemplo 6", category:"Categoría C", desc:"Los pedidos llegan directamente a tu WhatsApp.", price:18.00, emoji:"🎯", stock:"oferta" },
  ];
  // ══════════════════════════════════════════════════

  let cart = [];
  let activeCategory = 'Todos';

  const WA_SVG = `<svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>`;

  function getItem(name) { return cart.find(i => i.name === name); }

  function addToCart(name) {
    const p = products.find(p => p.name === name);
    if (!p || p.stock === 'agotado') return;
    const ex = getItem(name);
    if (ex) ex.qty++; else cart.push({ name:p.name, price:p.price, emoji:p.emoji, qty:1 });
    renderCart(); render();
    showToast('✓ ' + p.name + ' agregado al carrito');
  }

  function removeFromCart(name) { cart = cart.filter(i => i.name !== name); renderCart(); render(); }

  function changeQty(name, delta) {
    const item = getItem(name);
    if (!item) return;
    item.qty += delta;
    if (item.qty <= 0) removeFromCart(name); else { renderCart(); render(); }
  }

  function clearCart() { cart = []; renderCart(); render(); }

  function cartTotal() { return cart.reduce((s,i) => s + i.price * i.qty, 0).toFixed(2); }
  function cartCount() { return cart.reduce((s,i) => s + i.qty, 0); }

  function waProduct(name) {
    const msg = encodeURIComponent('Hola, quiero el producto: *' + name + '*. ¿Está disponible?');
    window.open('https://wa.me/' + WA_NUMBER + '?text=' + msg, '_blank');
  }

  function waCart() {
    if (!cart.length) return;
    const lines = cart.map(i => '• ' + i.emoji + ' ' + i.name + ' x' + i.qty + ' — $' + (i.price * i.qty).toFixed(2)).join('\n');
    const msg = encodeURIComponent('Hola, quiero pedir los siguientes productos:\n\n' + lines + '\n\n*Total estimado: $' + cartTotal() + '*\n\n¿Me pueden ayudar con mi pedido?');
    window.open('https://wa.me/' + WA_NUMBER + '?text=' + msg, '_blank');
  }

  function cartItemsHTML(limitH) {
    return cart.map(i => {
      const sn = i.name.replace(/'/g, "\\'");
      return '<div class="cart-item">'
        + '<div class="cart-item-emoji">' + i.emoji + '</div>'
        + '<div class="cart-item-info">'
        +   '<div class="cart-item-name">' + i.name + '</div>'
        +   '<div class="cart-item-price">$' + i.price.toFixed(2) + ' c/u</div>'
        +   '<div class="qty-ctrl">'
        +     '<button class="qty-btn" onclick="changeQty(\'' + sn + '\',-1)">−</button>'
        +     '<span class="qty-num">' + i.qty + '</span>'
        +     '<button class="qty-btn" onclick="changeQty(\'' + sn + '\',1)">+</button>'
        +   '</div>'
        + '</div>'
        + '<button class="cart-item-remove" onclick="removeFromCart(\'' + sn + '\')">✕</button>'
        + '</div>';
    }).join('');
  }

  function cartFooterHTML() {
    return '<div class="cart-total">'
      + '<span>Total estimado</span>'
      + '<span class="cart-total-amount">$' + cartTotal() + '</span>'
      + '</div>'
      + '<button class="btn-wa-cart" onclick="waCart()">'
      + WA_SVG.replace('width="15" height="15"','width="18" height="18"')
      + ' Pedir por WhatsApp</button>';
  }

  function renderCart() {
    const count = cartCount();
    const hdr = '<div class="cart-header">'
      + '<div class="cart-title">🛒 Mi Carrito <span class="cart-count">' + count + '</span></div>'
      + (count > 0 ? '<button class="cart-clear" onclick="clearCart()">Vaciar</button>' : '')
      + '</div>';

    const emptyMsg = '<div class="cart-empty">'
      + '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">'
      + '<path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>'
      + '</svg><p>Tu carrito está vacío.<br/>Agrega productos para hacer tu pedido.</p></div>';

    // Desktop
    const box = document.getElementById('cartBox');
    if (count === 0) {
      box.innerHTML = hdr + emptyMsg;
    } else {
      box.innerHTML = hdr
        + '<div class="cart-items">' + cartItemsHTML() + '</div>'
        + '<div class="cart-footer">' + cartFooterHTML() + '</div>';
    }

    // Drawer header (sin max-height)
    const di = document.getElementById('drawerInner');
    const df = document.getElementById('drawerFooter');
    const hdrD = '<div class="cart-header" style="border-bottom:1px solid var(--border);padding-bottom:14px;margin-bottom:12px;">'
      + '<div class="cart-title">🛒 Mi Carrito <span class="cart-count">' + count + '</span></div>'
      + (count > 0 ? '<button class="cart-clear" onclick="clearCart()">Vaciar</button>' : '')
      + '</div>';

    if (count === 0) {
      di.innerHTML = hdrD + emptyMsg;
      df.innerHTML = '';
    } else {
      di.innerHTML = hdrD + '<div class="cart-items" style="max-height:none">' + cartItemsHTML() + '</div>';
      df.innerHTML = cartFooterHTML();
    }

    // FAB
    const fab = document.getElementById('cartFab');
    document.getElementById('fabBadge').textContent = count;
    fab.style.display = count > 0 ? 'flex' : 'none';
  }

  function openDrawer() {
    document.getElementById('cartDrawer').classList.add('open');
    document.getElementById('drawerOverlay').style.cssText = 'opacity:1;pointer-events:auto';
  }

  function closeDrawer() {
    document.getElementById('cartDrawer').classList.remove('open');
    document.getElementById('drawerOverlay').style.cssText = 'opacity:0;pointer-events:none';
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  function buildFilters() {
    const cats = ['Todos', ...new Set(products.map(p => p.category))];
    document.getElementById('filterBtns').innerHTML = cats.map((c,i) =>
      '<button class="filter-btn ' + (i===0?'active':'') + '" onclick="setCategory(\'' + c + '\',this)">' + c + '</button>'
    ).join('');
  }

  function setCategory(cat, btn) {
    activeCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sectionLabel').textContent = cat === 'Todos' ? 'Todos los productos' : cat;
    render();
  }

  function filterProducts() { render(); }

  function render() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = products.filter(p => {
      const matchCat = activeCategory === 'Todos' || p.category === activeCategory;
      const matchQ = p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
      return matchCat && matchQ;
    });
    const grid = document.getElementById('productGrid');
    const empty = document.getElementById('emptyState');
    if (!filtered.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';

    grid.innerHTML = filtered.map((p, i) => {
      const agotado = p.stock === 'agotado';
      const badgeText = agotado ? 'Agotado' : p.stock === 'oferta' ? 'Oferta' : 'Disponible';
      const inCart = getItem(p.name);
      const sn = p.name.replace(/'/g, "\\'");
      const dis = agotado ? ' disabled' : '';
      return '<div class="card" style="animation-delay:' + (i*.06) + 's">'
        + '<div class="card-img-placeholder">' + p.emoji + '</div>'
        + '<div class="card-body">'
        +   '<div class="card-category">' + p.category + '</div>'
        +   '<div class="card-name">' + p.name + '</div>'
        +   '<div class="card-desc">' + p.desc + '</div>'
        +   '<div class="card-footer-row">'
        +     '<div class="price"><sup>$</sup>' + p.price.toFixed(2) + '</div>'
        +     '<span class="badge ' + (agotado?'agotado':'') + '">' + badgeText + '</span>'
        +   '</div>'
        +   '<div class="card-actions">'
        +     '<button class="btn btn-wa" onclick="waProduct(\'' + sn + '\')"' + dis + '>'
        +       WA_SVG + ' Pedir por WhatsApp'
        +     '</button>'
        +     '<button class="btn btn-cart ' + (inCart?'added':'') + '" onclick="addToCart(\'' + sn + '\')"' + dis + '>'
        +       (inCart
        +         ? '✓ En carrito (' + inCart.qty + ')'
        +         : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> Agregar al carrito')
        +     '</button>'
        +   '</div>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  buildFilters();
  render();
  renderCart();
  document.getElementById('drawerOverlay').style.cssText = 'opacity:0;pointer-events:none;transition:opacity .3s';
</script>
</body>
</html>
