<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lorvas Distribuidora – Catálogo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --card: #1e1e1e;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text: #f0ece4;
      --muted: #888;
      --border: #2a2a2a;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── HERO ── */
    header {
      position: relative;
      padding: 80px 40px 60px;
      text-align: center;
      overflow: hidden;
      border-bottom: 1px solid var(--border);
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 70% 60% at 50% 0%, rgba(201,168,76,0.18) 0%, transparent 70%),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 39px,
          rgba(201,168,76,0.04) 39px,
          rgba(201,168,76,0.04) 40px
        );
      pointer-events: none;
    }

    .logo-badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(201,168,76,0.12);
      border: 1px solid rgba(201,168,76,0.3);
      padding: 6px 18px 6px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold-light);
      margin-bottom: 28px;
    }

    .logo-badge span.dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--gold);
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #e8c97a 0%, #c9a84c 50%, #a07830 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }

    .tagline {
      color: var(--muted);
      font-size: 1.05rem;
      font-weight: 300;
      letter-spacing: 0.02em;
      max-width: 500px;
      margin: 0 auto 36px;
    }

    /* ── SEARCH + FILTROS ── */
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      max-width: 800px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 240px;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
    }

    input[type="text"] {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--gold); }

    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 10px 18px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: var(--gold);
      color: var(--gold-light);
      background: rgba(201,168,76,0.08);
    }

    /* ── GRID ── */
    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    .section-label {
      font-size: 0.75rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform 0.22s, border-color 0.22s, box-shadow 0.22s;
      cursor: default;
      animation: fadeUp 0.5s ease both;
    }

    .card:hover {
      transform: translateY(-4px);
      border-color: rgba(201,168,76,0.4);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.15);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card-img {
      width: 100%;
      aspect-ratio: 4/3;
      object-fit: cover;
      display: block;
      background: var(--surface);
    }

    .card-img-placeholder {
      width: 100%;
      aspect-ratio: 4/3;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }

    .card-body {
      padding: 20px;
    }

    .card-category {
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .card-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.55;
      margin-bottom: 16px;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .price {
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--gold-light);
    }

    .price sup {
      font-size: 0.7rem;
      vertical-align: super;
      font-weight: 300;
    }

    .badge {
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(201,168,76,0.12);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.25);
      letter-spacing: 0.06em;
    }

    .badge.agotado {
      background: rgba(255,80,80,0.1);
      color: #ff6060;
      border-color: rgba(255,80,80,0.25);
    }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      display: none;
    }

    .empty svg { margin-bottom: 16px; opacity: 0.4; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }

    footer strong { color: var(--gold); }

    /* ── WHATSAPP BTN ── */
    .wa-float {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #25d366;
      color: #fff;
      border-radius: 999px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      text-decoration: none;
      box-shadow: 0 6px 24px rgba(37,211,102,0.35);
      transition: transform 0.2s, box-shadow 0.2s;
      z-index: 100;
    }

    .wa-float:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(37,211,102,0.45);
    }

    @media (max-width: 600px) {
      header { padding: 60px 20px 48px; }
      .wa-float span { display: none; }
      .wa-float { padding: 16px; }
    }
  </style>
</head>
<body>

<!-- ── HERO ── -->
<header>
  <div class="logo-badge">
    <span class="dot"></span>
    Catálogo en línea
  </div>
  <h1>Lorvas Distribuidora</h1>
  <p class="tagline">Calidad y variedad en cada producto. Encuentra lo que necesitas.</p>

  <div class="toolbar">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar producto…" oninput="filterProducts()" />
    </div>
    <div class="filters" id="filterBtns">
      <button class="filter-btn active" onclick="setCategory('Todos', this)">Todos</button>
      <!-- Los demás botones se generan automáticamente -->
    </div>
  </div>
</header>

<!-- ── CATÁLOGO ── -->
<main>
  <div class="section-label" id="sectionLabel">Todos los productos</div>
  <div class="grid" id="productGrid"></div>
  <div class="empty" id="emptyState">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <p>No se encontraron productos.</p>
  </div>
</main>

<!-- ── FOOTER ── -->
<footer>
  <strong>Lorvas Distribuidora</strong> · Todos los precios en USD · Sujeto a disponibilidad
</footer>

<!-- ── WHATSAPP FLOTANTE ── -->
<!-- CAMBIA el número por el tuyo (con código de país, sin + ni espacios) -->
<a class="wa-float" href="https://wa.me/50300000000?text=Hola,%20vi%20su%20catálogo%20y%20me%20interesa%20un%20producto" target="_blank">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
  </svg>
  <span>Consultar por WhatsApp</span>
</a>

<script>
  // ══════════════════════════════════════════════════
  //  ✏️  EDITA AQUÍ TUS PRODUCTOS
  //  Campos: name, category, desc, price, emoji, stock
  //  stock: 'disponible' | 'agotado' | 'oferta'
  // ══════════════════════════════════════════════════
  const products = [
    {
      name: "Producto Ejemplo 1",
      category: "Categoría A",
      desc: "Descripción breve del producto. Cambia esto por los detalles reales.",
      price: "9.99",
      emoji: "📦",
      stock: "disponible"
    },
    {
      name: "Producto Ejemplo 2",
      category: "Categoría A",
      desc: "Otro producto de tu catálogo. Agrega marca, medida, cantidad, etc.",
      price: "14.50",
      emoji: "🛍️",
      stock: "oferta"
    },
    {
      name: "Producto Ejemplo 3",
      category: "Categoría B",
      desc: "Puedes poner tantos productos como necesites duplicando estos bloques.",
      price: "5.25",
      emoji: "✨",
      stock: "disponible"
    },
    {
      name: "Producto Ejemplo 4",
      category: "Categoría B",
      desc: "Si ya no tienes existencia, cambia stock a 'agotado'.",
      price: "22.00",
      emoji: "🔒",
      stock: "agotado"
    },
    {
      name: "Producto Ejemplo 5",
      category: "Categoría C",
      desc: "Agrega el emoji que mejor represente tu producto.",
      price: "3.75",
      emoji: "⚡",
      stock: "disponible"
    },
    {
      name: "Producto Ejemplo 6",
      category: "Categoría C",
      desc: "Recuerda actualizar el número de WhatsApp en el botón flotante.",
      price: "18.00",
      emoji: "🎯",
      stock: "oferta"
    },
  ];
  // ══════════════════════════════════════════════════

  let activeCategory = 'Todos';

  function getStockLabel(stock) {
    if (stock === 'agotado') return ['agotado', 'Agotado'];
    if (stock === 'oferta')  return ['', 'Oferta'];
    return ['', 'Disponible'];
  }

  function buildFilters() {
    const cats = ['Todos', ...new Set(products.map(p => p.category))];
    const wrap = document.getElementById('filterBtns');
    wrap.innerHTML = cats.map((c, i) =>
      `<button class="filter-btn ${i===0?'active':''}" onclick="setCategory('${c}', this)">${c}</button>`
    ).join('');
  }

  function setCategory(cat, btn) {
    activeCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('sectionLabel').textContent = cat === 'Todos' ? 'Todos los productos' : cat;
    render();
  }

  function filterProducts() { render(); }

  function render() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const filtered = products.filter(p => {
      const matchCat = activeCategory === 'Todos' || p.category === activeCategory;
      const matchQ   = p.name.toLowerCase().includes(q) || p.desc.toLowerCase().includes(q);
      return matchCat && matchQ;
    });

    const grid = document.getElementById('productGrid');
    const empty = document.getElementById('emptyState');

    if (filtered.length === 0) {
      grid.innerHTML = '';
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    grid.innerHTML = filtered.map((p, i) => {
      const [badgeClass, badgeText] = getStockLabel(p.stock);
      return `
        <div class="card" style="animation-delay:${i*0.06}s">
          <div class="card-img-placeholder">${p.emoji}</div>
          <div class="card-body">
            <div class="card-category">${p.category}</div>
            <div class="card-name">${p.name}</div>
            <div class="card-desc">${p.desc}</div>
            <div class="card-footer">
              <div class="price"><sup>$</sup>${p.price}</div>
              <span class="badge ${badgeClass}">${badgeText}</span>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  buildFilters();
  render();
</script>
</body>
</html>
