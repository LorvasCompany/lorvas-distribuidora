<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin – Lorvas Distribuidora</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:#0d0d0d; --surface:#161616; --card:#1e1e1e; --card2:#242424;
      --gold:#c9a84c; --gold-light:#e8c97a; --gold-dim:rgba(201,168,76,.12);
      --text:#f0ece4; --muted:#888; --border:#2a2a2a; --radius:10px;
      --red:#e05555; --green:#3ecf6e;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;}

    /* TOPBAR */
    .topbar{
      background:var(--surface); border-bottom:1px solid var(--border);
      padding:0 28px; height:60px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100;
    }
    .topbar-brand{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--gold-light);}
    .topbar-brand span{color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.8rem;margin-left:10px;font-weight:300;}
    .topbar-link{font-size:.82rem;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:6px 14px;border-radius:8px;transition:all .2s;}
    .topbar-link:hover{border-color:var(--gold);color:var(--gold-light);}

    /* LAYOUT */
    .layout{display:grid;grid-template-columns:1fr 380px;gap:24px;max-width:1200px;margin:0 auto;padding:28px 24px 60px;}
    @media(max-width:900px){.layout{grid-template-columns:1fr;}}

    /* SECCIÓN */
    .section-title{font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:10px;}
    .section-title::after{content:'';flex:1;height:1px;background:var(--border);}

    /* TABLA */
    .table-wrap{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
    .table-head{display:grid;grid-template-columns:56px 1fr 90px 100px 90px 80px;gap:0;background:var(--surface);border-bottom:1px solid var(--border);}
    .th{padding:11px 14px;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);}
    .product-row{display:grid;grid-template-columns:56px 1fr 90px 100px 90px 80px;gap:0;border-bottom:1px solid var(--border);align-items:center;transition:background .15s;}
    .product-row:last-child{border-bottom:none;}
    .product-row:hover{background:var(--card2);}
    .td{padding:12px 14px;font-size:.875rem;}
    .td-img{display:flex;align-items:center;justify-content:center;}
    .thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;background:var(--surface);}
    .thumb-emoji{width:36px;height:36px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:1.3rem;}
    .td-name{min-width:0;}
    .prod-name{font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .prod-cat{font-size:.75rem;color:var(--muted);margin-top:2px;}
    .td-price{color:var(--gold-light);font-weight:500;}
    .stock-badge{display:inline-block;font-size:.7rem;padding:3px 9px;border-radius:999px;}
    .stock-disponible{background:rgba(62,207,110,.12);color:var(--green);border:1px solid rgba(62,207,110,.25);}
    .stock-agotado{background:rgba(224,85,85,.12);color:var(--red);border:1px solid rgba(224,85,85,.25);}
    .stock-oferta{background:rgba(201,168,76,.12);color:var(--gold);border:1px solid rgba(201,168,76,.25);}
    .td-actions{display:flex;gap:6px;}
    .act-btn{padding:5px 10px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.75rem;cursor:pointer;transition:all .15s;}
    .act-btn:hover{border-color:var(--gold);color:var(--gold-light);}
    .act-btn.del:hover{border-color:var(--red);color:var(--red);}
    .empty-table{padding:48px;text-align:center;color:var(--muted);font-size:.9rem;}

    /* FORMULARIO */
    .form-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:22px;}
    .form-title{font-family:'Playfair Display',serif;font-size:1rem;color:var(--text);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border);}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
    .form-group{display:flex;flex-direction:column;gap:6px;}
    .form-group.full{grid-column:1/-1;}
    label{font-size:.78rem;color:var(--muted);letter-spacing:.04em;}
    input[type=text],input[type=number],textarea,select{
      width:100%;padding:9px 12px;background:var(--surface);border:1px solid var(--border);
      border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.875rem;outline:none;transition:border-color .2s;
    }
    input[type=text]:focus,input[type=number]:focus,textarea:focus,select:focus{border-color:var(--gold);}
    textarea{resize:vertical;min-height:72px;}
    select option{background:var(--card);}

    /* IMAGE UPLOAD */
    .img-upload-area{
      border:2px dashed var(--border);border-radius:8px;padding:18px;text-align:center;
      cursor:pointer;transition:border-color .2s;position:relative;
    }
    .img-upload-area:hover{border-color:var(--gold);}
    .img-upload-area input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
    .img-preview{width:100%;max-height:130px;object-fit:contain;border-radius:6px;margin-bottom:8px;display:none;}
    .upload-placeholder{color:var(--muted);font-size:.82rem;line-height:1.6;}
    .upload-placeholder strong{color:var(--gold);display:block;font-size:1.4rem;margin-bottom:4px;}
    .emoji-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .emoji-opt{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .15s;}
    .emoji-opt:hover,.emoji-opt.sel{border-color:var(--gold);background:var(--gold-dim);}

    /* BOTONES FORM */
    .form-actions{display:flex;gap:10px;margin-top:18px;}
    .btn-save{flex:1;padding:11px;border-radius:8px;border:none;background:var(--gold);color:#000;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:600;cursor:pointer;transition:background .2s;}
    .btn-save:hover{background:var(--gold-light);}
    .btn-cancel{padding:11px 16px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.875rem;cursor:pointer;transition:all .2s;}
    .btn-cancel:hover{border-color:var(--red);color:var(--red);}

    /* EXPORT/IMPORT */
    .tools-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
    .tool-btn{padding:9px 16px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.8rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
    .tool-btn:hover{border-color:var(--gold);color:var(--gold-light);}

    /* TOAST */
    .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--gold);color:var(--gold-light);padding:10px 22px;border-radius:999px;font-size:.85rem;font-weight:500;opacity:0;pointer-events:none;transition:all .3s;z-index:500;white-space:nowrap;}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

    /* MODAL CONFIRMAR */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-overlay.show{opacity:1;pointer-events:auto;}
    .modal{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:340px;width:90%;text-align:center;}
    .modal h3{font-family:'Playfair Display',serif;font-size:1.1rem;margin-bottom:10px;}
    .modal p{color:var(--muted);font-size:.875rem;line-height:1.55;margin-bottom:22px;}
    .modal-actions{display:flex;gap:10px;justify-content:center;}
    .modal-confirm{padding:10px 24px;border-radius:8px;border:none;background:var(--red);color:#fff;font-family:'DM Sans',sans-serif;font-size:.875rem;font-weight:600;cursor:pointer;}
    .modal-cancel{padding:10px 24px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.875rem;cursor:pointer;}

    @media(max-width:700px){
      .table-head,.product-row{grid-template-columns:44px 1fr 80px 70px;}
      .th:nth-child(3),.td:nth-child(3),.th:nth-child(5),.td:nth-child(5){display:none;}
      .form-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">Lorvas Distribuidora <span>Panel de administración</span></div>
  <a href="index.html" class="topbar-link">Ver catálogo →</a>
</div>

<div class="layout">

  <!-- LISTA -->
  <div>
    <div class="section-title">Productos registrados</div>
    <div class="table-wrap">
      <div class="table-head">
        <div class="th"></div>
        <div class="th">Producto</div>
        <div class="th">Precio</div>
        <div class="th">Disponibilidad</div>
        <div class="th">Categoría</div>
        <div class="th">Acciones</div>
      </div>
      <div id="productList"></div>
    </div>

    <div class="tools-row">
      <button class="tool-btn" id="btnExport">&#128190; Exportar JSON</button>
      <label class="tool-btn" style="cursor:pointer;">
        &#128228; Importar JSON
        <input type="file" accept=".json" id="importFile" style="display:none;"/>
      </label>
      <button class="tool-btn" id="btnReset">&#8635; Restaurar ejemplos</button>
    </div>
  </div>

  <!-- FORMULARIO -->
  <div>
    <div class="section-title" id="formSectionTitle">Agregar producto</div>
    <div class="form-box">
      <div class="form-title" id="formTitle">Nuevo producto</div>

      <div class="form-grid">
        <div class="form-group full">
          <label>Imagen del producto</label>
          <div class="img-upload-area" id="uploadArea">
            <input type="file" id="imgFile" accept="image/*"/>
            <img id="imgPreview" class="img-preview"/>
            <div class="upload-placeholder" id="uploadPlaceholder">
              <strong>&#128247;</strong>
              Haz clic o arrastra una imagen aquí
            </div>
          </div>
          <div style="margin-top:8px;">
            <label style="display:block;margin-bottom:6px;">O elige un emoji representativo:</label>
            <div class="emoji-row" id="emojiRow"></div>
          </div>
          <input type="hidden" id="fImgData"/>
          <input type="hidden" id="fEmoji"/>
        </div>

        <div class="form-group full">
          <label>Nombre del producto *</label>
          <input type="text" id="fName" placeholder="Ej: Aceite de oliva 500ml"/>
        </div>

        <div class="form-group full">
          <label>Descripción</label>
          <textarea id="fDesc" placeholder="Marca, cantidad, características…"></textarea>
        </div>

        <div class="form-group">
          <label>Precio (USD) *</label>
          <input type="number" id="fPrice" min="0" step="0.01" placeholder="0.00"/>
        </div>

        <div class="form-group">
          <label>Disponibilidad</label>
          <select id="fStock">
            <option value="disponible">Disponible</option>
            <option value="oferta">En oferta</option>
            <option value="agotado">Agotado</option>
          </select>
        </div>

        <div class="form-group full">
          <label>Categoría</label>
          <input type="text" id="fCat" placeholder="Ej: Lácteos, Limpieza, Bebidas…" list="catList"/>
          <datalist id="catList"></datalist>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn-save" id="btnSave">Guardar producto</button>
        <button class="btn-cancel" id="btnCancel" style="display:none;">Cancelar</button>
      </div>
    </div>
  </div>
</div>

<!-- MODAL ELIMINAR -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Eliminar producto</h3>
    <p id="modalMsg">¿Estás seguro? Esta acción no se puede deshacer.</p>
    <div class="modal-actions">
      <button class="modal-cancel" id="modalCancel">Cancelar</button>
      <button class="modal-confirm" id="modalConfirm">Eliminar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var STORAGE_KEY = 'lorvas_products';

var DEFAULT_PRODUCTS = [
  { id:uid(), name:'Producto Ejemplo 1', category:'Categoría A', desc:'Descripción breve. Cambia esto por los detalles reales.', price:9.99,  emoji:'📦', imgData:'', stock:'disponible' },
  { id:uid(), name:'Producto Ejemplo 2', category:'Categoría A', desc:'Agrega marca, medida, cantidad u otros detalles.', price:14.50, emoji:'🛍️', imgData:'', stock:'oferta' },
  { id:uid(), name:'Producto Ejemplo 3', category:'Categoría B', desc:'Duplica este bloque para agregar más productos.', price:5.25,  emoji:'✨', imgData:'', stock:'disponible' },
  { id:uid(), name:'Producto Ejemplo 4', category:'Categoría B', desc:'Cambia stock a agotado si no tienes existencia.', price:22.00, emoji:'🔒', imgData:'', stock:'agotado' },
  { id:uid(), name:'Producto Ejemplo 5', category:'Categoría C', desc:'Usa el emoji que mejor represente tu producto.', price:3.75,  emoji:'⚡', imgData:'', stock:'disponible' },
  { id:uid(), name:'Producto Ejemplo 6', category:'Categoría C', desc:'Los pedidos llegan directo a tu WhatsApp.', price:18.00, emoji:'🎯', imgData:'', stock:'oferta' }
];

var EMOJIS = ['📦','🛍️','✨','⚡','🎯','🧴','🧹','🥤','🧃','🍫','🧀','🥩','🧼','🪣','🔌','💊','🌿','🧺','🥫','🍬','🧻','🪴','🔑','🎁'];

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

var products = [];
var editingId = null;
var deleteTargetId = null;
var selectedEmoji = '📦';

function load() {
  try {
    var raw = localStorage.getItem(STORAGE_KEY);
    if (raw) { products = JSON.parse(raw); }
    else { products = DEFAULT_PRODUCTS.slice(); save(); }
  } catch(e) { products = DEFAULT_PRODUCTS.slice(); }
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
}

/* ── RENDER LISTA ── */
function renderList() {
  var el = document.getElementById('productList');
  if (!products.length) {
    el.innerHTML = '<div class="empty-table">No hay productos. Agrega el primero usando el formulario.</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < products.length; i++) {
    var p = products[i];
    var thumb = p.imgData
      ? '<img class="thumb" src="' + p.imgData + '" alt=""/>'
      : '<div class="thumb-emoji">' + (p.emoji || '📦') + '</div>';
    var sc = 'stock-' + p.stock;
    var sl = p.stock === 'disponible' ? 'Disponible' : p.stock === 'oferta' ? 'Oferta' : 'Agotado';
    html += '<div class="product-row" data-id="' + p.id + '">'
      + '<div class="td td-img">' + thumb + '</div>'
      + '<div class="td td-name"><div class="prod-name">' + esc(p.name) + '</div><div class="prod-cat">' + esc(p.category) + '</div></div>'
      + '<div class="td td-price">$' + Number(p.price).toFixed(2) + '</div>'
      + '<div class="td"><span class="stock-badge ' + sc + '">' + sl + '</span></div>'
      + '<div class="td" style="color:var(--muted);font-size:.8rem;">' + esc(p.category) + '</div>'
      + '<div class="td td-actions">'
      +   '<button class="act-btn" data-edit="' + p.id + '">Editar</button>'
      +   '<button class="act-btn del" data-del="' + p.id + '">Borrar</button>'
      + '</div>'
      + '</div>';
  }
  el.innerHTML = html;

  // eventos
  var editBtns = el.querySelectorAll('[data-edit]');
  var delBtns  = el.querySelectorAll('[data-del]');
  for (var a = 0; a < editBtns.length; a++) {
    (function(btn){ btn.onclick = function(){ startEdit(btn.getAttribute('data-edit')); }; })(editBtns[a]);
  }
  for (var b = 0; b < delBtns.length; b++) {
    (function(btn){ btn.onclick = function(){ askDelete(btn.getAttribute('data-del')); }; })(delBtns[b]);
  }

  updateCatList();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── CATLIST DATALIST ── */
function updateCatList() {
  var seen = {};
  var html = '';
  for (var i = 0; i < products.length; i++) {
    var c = products[i].category;
    if (c && !seen[c]) { seen[c] = true; html += '<option value="' + esc(c) + '"/>'; }
  }
  document.getElementById('catList').innerHTML = html;
}

/* ── EMOJIS ── */
function buildEmojis() {
  var row = document.getElementById('emojiRow');
  var html = '';
  for (var i = 0; i < EMOJIS.length; i++) {
    html += '<button type="button" class="emoji-opt" data-emoji="' + EMOJIS[i] + '">' + EMOJIS[i] + '</button>';
  }
  row.innerHTML = html;
  var btns = row.querySelectorAll('.emoji-opt');
  for (var j = 0; j < btns.length; j++) {
    (function(btn){
      btn.onclick = function(){
        selectedEmoji = btn.getAttribute('data-emoji');
        document.getElementById('fEmoji').value = selectedEmoji;
        var all = row.querySelectorAll('.emoji-opt');
        for (var k=0;k<all.length;k++) all[k].classList.remove('sel');
        btn.classList.add('sel');
      };
    })(btns[j]);
  }
  // marcar primero
  selectEmojiBtn('📦');
}

function selectEmojiBtn(em) {
  var btns = document.getElementById('emojiRow').querySelectorAll('.emoji-opt');
  for (var i=0;i<btns.length;i++) {
    if (btns[i].getAttribute('data-emoji') === em) btns[i].classList.add('sel');
    else btns[i].classList.remove('sel');
  }
  selectedEmoji = em;
}

/* ── IMAGEN UPLOAD ── */
function setupUpload() {
  var fileInput = document.getElementById('imgFile');
  fileInput.onchange = function() {
    var file = fileInput.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      showImgPreview(e.target.result);
      document.getElementById('fImgData').value = e.target.result;
    };
    reader.readAsDataURL(file);
  };
}

function showImgPreview(src) {
  var prev = document.getElementById('imgPreview');
  var ph   = document.getElementById('uploadPlaceholder');
  if (src) {
    prev.src = src;
    prev.style.display = 'block';
    ph.style.display = 'none';
  } else {
    prev.src = '';
    prev.style.display = 'none';
    ph.style.display = 'block';
  }
}

/* ── FORMULARIO ── */
function clearForm() {
  editingId = null;
  document.getElementById('fName').value = '';
  document.getElementById('fDesc').value = '';
  document.getElementById('fPrice').value = '';
  document.getElementById('fStock').value = 'disponible';
  document.getElementById('fCat').value = '';
  document.getElementById('fImgData').value = '';
  document.getElementById('fEmoji').value = '📦';
  document.getElementById('imgFile').value = '';
  showImgPreview('');
  selectEmojiBtn('📦');
  document.getElementById('formTitle').textContent = 'Nuevo producto';
  document.getElementById('formSectionTitle').textContent = 'Agregar producto';
  document.getElementById('btnCancel').style.display = 'none';
  document.getElementById('btnSave').textContent = 'Guardar producto';
}

function startEdit(id) {
  var p = null;
  for (var i=0;i<products.length;i++) { if (products[i].id === id) { p = products[i]; break; } }
  if (!p) return;
  editingId = id;
  document.getElementById('fName').value  = p.name;
  document.getElementById('fDesc').value  = p.desc;
  document.getElementById('fPrice').value = p.price;
  document.getElementById('fStock').value = p.stock;
  document.getElementById('fCat').value   = p.category;
  document.getElementById('fImgData').value = p.imgData || '';
  document.getElementById('fEmoji').value   = p.emoji || '📦';
  showImgPreview(p.imgData || '');
  selectEmojiBtn(p.emoji || '📦');
  document.getElementById('formTitle').textContent = 'Editando: ' + p.name;
  document.getElementById('formSectionTitle').textContent = 'Editar producto';
  document.getElementById('btnCancel').style.display = 'block';
  document.getElementById('btnSave').textContent = 'Actualizar producto';
  document.querySelector('.form-box').scrollIntoView({behavior:'smooth'});
}

function saveProduct() {
  var name  = document.getElementById('fName').value.trim();
  var price = parseFloat(document.getElementById('fPrice').value);
  if (!name)       { showToast('⚠ Escribe el nombre del producto'); return; }
  if (isNaN(price) || price < 0) { showToast('⚠ Escribe un precio válido'); return; }

  var p = {
    id:      editingId || uid(),
    name:    name,
    desc:    document.getElementById('fDesc').value.trim(),
    price:   price,
    stock:   document.getElementById('fStock').value,
    category:document.getElementById('fCat').value.trim() || 'General',
    imgData: document.getElementById('fImgData').value,
    emoji:   document.getElementById('fEmoji').value || selectedEmoji || '📦'
  };

  if (editingId) {
    for (var i=0;i<products.length;i++) {
      if (products[i].id === editingId) { products[i] = p; break; }
    }
    showToast('✓ Producto actualizado');
  } else {
    products.push(p);
    showToast('✓ Producto agregado');
  }
  save();
  renderList();
  clearForm();
}

/* ── ELIMINAR ── */
function askDelete(id) {
  deleteTargetId = id;
  var p = null;
  for (var i=0;i<products.length;i++) { if (products[i].id===id) { p=products[i]; break; } }
  if (p) document.getElementById('modalMsg').textContent = '¿Eliminar "' + p.name + '"? Esta acción no se puede deshacer.';
  document.getElementById('modalOverlay').classList.add('show');
}

function confirmDelete() {
  var next = [];
  for (var i=0;i<products.length;i++) { if (products[i].id !== deleteTargetId) next.push(products[i]); }
  products = next;
  save(); renderList();
  closeModal();
  showToast('Producto eliminado');
  if (editingId === deleteTargetId) clearForm();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  deleteTargetId = null;
}

/* ── EXPORT / IMPORT ── */
function exportJSON() {
  var clean = [];
  for (var i=0;i<products.length;i++) {
    var p = products[i];
    clean.push({ id:p.id, name:p.name, category:p.category, desc:p.desc, price:p.price, stock:p.stock, emoji:p.emoji, imgData:p.imgData||'' });
  }
  var blob = new Blob([JSON.stringify(clean, null, 2)], {type:'application/json'});
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href = url; a.download = 'lorvas-productos.json'; a.click();
  URL.revokeObjectURL(url);
}

document.getElementById('importFile').onchange = function() {
  var file = this.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var data = JSON.parse(e.target.result);
      if (!Array.isArray(data)) throw new Error();
      for (var i=0;i<data.length;i++) { if (!data[i].id) data[i].id = uid(); }
      products = data;
      save(); renderList();
      showToast('✓ ' + data.length + ' productos importados');
    } catch(err) {
      showToast('⚠ El archivo JSON no es válido');
    }
  };
  reader.readAsText(file);
};

/* ── RESET ── */
function resetToDefault() {
  products = DEFAULT_PRODUCTS.map(function(p){ return Object.assign({}, p, {id:uid()}); });
  save(); renderList();
  showToast('✓ Productos de ejemplo restaurados');
}

/* ── TOAST ── */
var toastTimer;
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, 2600);
}

/* ── EVENTOS GENERALES ── */
document.getElementById('btnSave').onclick   = saveProduct;
document.getElementById('btnCancel').onclick = clearForm;
document.getElementById('btnExport').onclick = exportJSON;
document.getElementById('btnReset').onclick  = resetToDefault;
document.getElementById('modalConfirm').onclick = confirmDelete;
document.getElementById('modalCancel').onclick  = closeModal;
document.getElementById('modalOverlay').onclick = function(e) { if (e.target === this) closeModal(); };

/* ── INIT ── */
buildEmojis();
setupUpload();
load();
renderList();
</script>
</body>
</html>
